<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a12"/>
      <stop offset="1" stop-color="#1a0808"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dc0000"/>
      <stop offset="1" stop-color="#ff5c5c"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#ff3b30" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#ff3b30"/>
      <stop offset="1" stop-color="#ff9500"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle chart lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- decorative rising line chart -->
  <polyline
    points="60,530 250,470 440,420 630,320 820,240 1010,140 1140,90"
    fill="none" stroke="url(#line)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"
    opacity="0.65"/>
  <g fill="#ff9500">
    <circle cx="1010" cy="140" r="8"/>
    <circle cx="1140" cy="90" r="10"/>
  </g>

  <!-- top brand strip -->
  <rect x="60" y="80" width="10" height="70" fill="url(#accent)"/>
  <text x="90" y="112" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-weight="600" font-size="22" fill="#e84848" letter-spacing="4">BNI TOP CHAPTER</text>
  <text x="90" y="146" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-weight="400" font-size="18" fill="#ffffff" opacity="0.55">2026年7月13日 — 8月12日</text>

  <!-- title -->
  <text x="90" y="290" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-weight="900" font-size="88" fill="#ffffff" letter-spacing="-2">チャプター</text>
  <text x="90" y="390" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-weight="900" font-size="88" fill="#ffffff" letter-spacing="-2">ゲーム 2026</text>

  <!-- subtitle -->
  <text x="94" y="450" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-weight="600" font-size="26" fill="#ffffff" opacity="0.7">17チーム・約90名で競う 4週間のポイントレース</text>

  <!-- stats badges -->
  <g transform="translate(90,500)">
    <rect x="0" y="0" width="200" height="80" rx="12" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="100" y="34" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN',sans-serif" font-size="11" fill="#ffffff" opacity="0.5" letter-spacing="3">TEAMS</text>
    <text x="100" y="66" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN',sans-serif" font-weight="900" font-size="30" fill="#e84848">17</text>

    <rect x="220" y="0" width="200" height="80" rx="12" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="320" y="34" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN',sans-serif" font-size="11" fill="#ffffff" opacity="0.5" letter-spacing="3">MEMBERS</text>
    <text x="320" y="66" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN',sans-serif" font-weight="900" font-size="30" fill="#e84848">82</text>

    <rect x="440" y="0" width="200" height="80" rx="12" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="540" y="34" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN',sans-serif" font-size="11" fill="#ffffff" opacity="0.5" letter-spacing="3">WEEKS</text>
    <text x="540" y="66" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN',sans-serif" font-weight="900" font-size="30" fill="#e84848">4</text>
  </g>

  <!-- LIVE badge -->
  <g transform="translate(970,90)">
    <rect x="0" y="0" width="140" height="42" rx="21" fill="#ffffff" fill-opacity="0.1"/>
    <circle cx="22" cy="21" r="7" fill="#4ade80"/>
    <text x="42" y="28" font-family="'Hiragino Kaku Gothic ProN',sans-serif" font-weight="700" font-size="16" fill="#ffffff" letter-spacing="3">LIVE</text>
  </g>
</svg>
